# IPPO Configuration for Coin Game
defaults:
  - ippo_base
  - _self_
  - reward: common  # override on CLI: reward=individual
  - influence: disabled  # override on CLI: influence=enabled_shared (social-influence intrinsic reward)

# Environment-specific settings
"ENV_NAME": "coin_game"

"ENV_KWARGS":
  "num_agents": 2
  "num_inner_steps": 1000
  "cnn": True
  "jit": True
