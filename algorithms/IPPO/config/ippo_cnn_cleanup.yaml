# IPPO Configuration for Clean Up
defaults:
  - ippo_base
  - _self_
  - reward: common  # override on CLI: reward=individual
  - influence: disabled  # override on CLI: influence=enabled (social-influence intrinsic reward)

# Environment-specific settings
"ENV_NAME": "clean_up"

"ENV_KWARGS":
  "num_agents": 7
  "num_inner_steps": 1000
  "cnn": True
  "jit": True
