# Base IPPO Configuration
# Common hyperparameters shared across all IPPO experiments
# Individual configs can override these defaults

# PPO Training hyperparameters
"LR": 0.0005
"NUM_ENVS": 128
"NUM_STEPS": 1000
"TOTAL_TIMESTEPS": 1e8
"UPDATE_EPOCHS": 2
"NUM_MINIBATCHES": 500
"GAMMA": 0.99
"GAE_LAMBDA": 0.95
"CLIP_EPS": 0.2
"ENT_COEF": 0.01
"VF_COEF": 0.5
"MAX_GRAD_NORM": 0.5
"ACTIVATION": "relu"

# Reward shaping
"REW_SHAPING_HORIZON": 2.5e6
"SHAPING_BEGIN": 1e6

# Environment defaults (common settings)
"ENV_KWARGS":
  "num_inner_steps": 1000
  "shared_rewards": False
  "cnn": True
  "jit": True

# Training settings
"ANNEAL_LR": True
"PARAMETER_SHARING": True
"TUNE": False

# Seed and evaluation
"SEED": 30
"NUM_SEEDS": 1
"GIF_NUM_FRAMES": 250

# WandB defaults
"ENTITY": ""
"PROJECT": "socialjax"
"WANDB_MODE": "online"
"RUN_LABEL": null  # optional free-text tag appended to the wandb run name / checkpoint filename
